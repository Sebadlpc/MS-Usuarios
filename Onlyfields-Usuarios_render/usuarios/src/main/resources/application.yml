server:
  port: ${PORT:8081}

spring:
  datasource:
    # Si no hay URL de producción, usa H2 en memoria simulando MySQL
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:onlyfields_db;DB_CLOSE_DELAY=-1;MODE=MySQL}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}

  jpa:
    hibernate:
      # En Render creará las tablas en memoria; localmente no romperá tu flujo
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: ${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
    show-sql: true

  flyway:
    # Apagamos Flyway en Render si no hay una base de datos real para no causar choques
    enabled: ${FLYWAY_ENABLED:false}
    locations: classpath:db/migration