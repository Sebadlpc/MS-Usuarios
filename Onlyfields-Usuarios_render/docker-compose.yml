services:
  db-mysql:
    image: mysql:8.0
    container_name: onlyfields-db-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: onlyfields_usuarios
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - onlyfields-network
    restart: unless-stopped

  ms-usuarios:
    build:
      context: .
      dockerfile: usuarios/Dockerfile.validate
    container_name: onlyfields-ms-usuarios
    ports:
      - "8081:8081"
    depends_on:
      - db-mysql
    networks:
      - onlyfields-network
    restart: unless-stopped

  ms-reservas:
    build:
      context: .
      dockerfile: reservas/Dockerfile.validate
    container_name: onlyfields-ms-reservas
    ports:
      - "8082:8082"
    depends_on:
      - db-mysql
    networks:
      - onlyfields-network
    restart: unless-stopped

  ms-pos:
    build:
      context: .
      dockerfile: pos/Dockerfile.validate
    container_name: onlyfields-ms-pos
    ports:
      - "8083:8083"
    depends_on:
      - db-mysql
    networks:
      - onlyfields-network
    restart: unless-stopped

  ms-suscripciones:
    build:
      context: .
      dockerfile: suscripciones/Dockerfile.validate
    container_name: onlyfields-ms-suscripciones
    ports:
      - "8084:8084"
    depends_on:
      - db-mysql
    networks:
      - onlyfields-network
    restart: unless-stopped

  ms-inventario:
    build:
      context: .
      dockerfile: Inventario/Dockerfile.validate
    container_name: onlyfields-ms-inventario
    ports:
      - "8085:8085"
    depends_on:
      - db-mysql
    networks:
      - onlyfields-network
    restart: unless-stopped

  ms-accesos:
    build:
      context: .
      dockerfile: accesos/Dockerfile.validate
    container_name: onlyfields-ms-accesos
    ports:
      - "8086:8086"
    depends_on:
      - db-mysql
    networks:
      - onlyfields-network
    restart: unless-stopped

  ms-seguimiento:
    build:
      context: .
      dockerfile: seguimiento/Dockerfile.validate
    container_name: onlyfields-ms-seguimiento
    ports:
      - "8087:8087"
    depends_on:
      - db-mysql
    networks:
      - onlyfields-network
    restart: unless-stopped

  ms-reportes:
    build:
      context: .
      dockerfile: reportes/Dockerfile.validate
    container_name: onlyfields-ms-reportes
    ports:
      - "8088:8088"
    depends_on:
      - db-mysql
    networks:
      - onlyfields-network
    restart: unless-stopped

  ms-configuracion:
    build:
      context: .
      dockerfile: Configuracion/Dockerfile.validate
    container_name: onlyfields-ms-configuracion
    ports:
      - "8089:8089"
    depends_on:
      - db-mysql
    networks:
      - onlyfields-network
    restart: unless-stopped

  ms-notificaciones:
    build:
      context: .
      dockerfile: notificaciones/Dockerfile.validate
    container_name: onlyfields-ms-notificaciones
    ports:
      - "8090:8090"
    depends_on:
      - db-mysql
    networks:
      - onlyfields-network
    restart: unless-stopped

networks:
  onlyfields-network:
    driver: bridge

volumes:
  mysql-data: